<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Tracking de entreno móvil con Firebase, rutinas versionadas, progreso y reportes.">
  <title>Arslan Training Tracker Elite</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">MOBILE FIRST · FIREBASE READY</p>
        <h1>Arslan Training Tracker Elite</h1>
      </div>
      <button class="icon-btn" id="themeBtn" aria-label="Cambiar tema">◐</button>
    </header>

    <section id="bootCard" class="card hero slim">
      <div>
        <h2 class="mb8">Cargando versión optimizada</h2>
        <p class="muted" id="bootText">Primero se pinta la interfaz. Firebase se conecta después para que abra antes en móvil.</p>
      </div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row short"></div>
    </section>

    <main id="views">
      <section id="view-home" class="view active"></section>
      <section id="view-workout" class="view"></section>
      <section id="view-progress" class="view"></section>
      <section id="view-programs" class="view"></section>
      <section id="view-reports" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>

    <div id="fabTimer" class="timer-fab hidden" aria-live="polite"></div>

    <nav class="bottom-nav bottom-nav-6">
      <button class="nav-btn active" data-view="home">Inicio</button>
      <button class="nav-btn" data-view="workout">Entreno</button>
      <button class="nav-btn" data-view="progress">Progreso</button>
      <button class="nav-btn" data-view="programs">Rutinas</button>
      <button class="nav-btn" data-view="reports">Reportes</button>
      <button class="nav-btn" data-view="settings">Ajustes</button>
    </nav>
  </div>

  <script src="./firebase-config.js" defer></script>
  <script src="./pdf-service.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
